    <form>
        <div class="form-group">
            <label for="nameInput">Nombre</label>
            <input type="text" class="form-control" id="nameInput" placeholder="Escriba el nombre del empleado..."
                required>
        </div>
        <div class="form-group">
            <label for="lastNameInput">Apellido</label>
            <input type="text" class="form-control" id="lastNameInput" placeholder="Escriba el apellido..." required>
        </div>
        <div class="form-group">
            <label for="DNI_Input">DNI</label>
            <input type="text" class="form-control" id="DNI_Input" placeholder="Escriba el DNI..." required>
        </div>
        <div class="form-group">
            <label for="addressInput">Direccion</label>
            <input type="text" class="form-control" id="addressInput" placeholder="Escriba su direccion..." required>
        </div>
        <div class="form-group">
            <label for="salaryHsInput">Salario por hora</label>
            <div class="priceDiv">
                <input type="text" class="form-control" id="salaryHsInput" placeholder="Coloque su salario por hora..."
                    required>
            </div>
        </div>
        <div class="form-group">
            <label for="hoursPerWeekInput">Horas semanales</label>
            <div class="priceDiv">
                <input type="text" class="form-control" id="hoursPerWeekInput"
                    placeholder="Coloque la cantidad de horas semanales que trabaja..." required>
            </div>
        </div>
        <button type="submit" class="btn btn-dark">Guardar empleado y calcular</button>
    </form>
    <div class="row row-cols-1 row-cols-md-3 cardInfo">
